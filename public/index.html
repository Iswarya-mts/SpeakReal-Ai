<script>
const BACKEND_URL = "https://speakreal-ai-production.up.railway.app";

// ── STATE ──
let selectedVoice = 'Maya';
let sessionId = 'session_' + Date.now();
let recognition = null;
let isListening = false;
let speechSynth = window.speechSynthesis;
let availableVoices = [];

// Load voices
speechSynth.onvoiceschanged = () => {
  availableVoices = speechSynth.getVoices();
};

// ── CHARACTER SELECT ──
function selectVoice(el) {
  document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedVoice = el.dataset.voice;
}

// ── START CHAT ──
async function startChat() {
  document.getElementById('screen-onboard').classList.remove('active');
  document.getElementById('screen-chat').classList.add('active');

  document.getElementById('hdr-name').textContent = selectedVoice;

  await fetchOpening();
}

// ── FETCH OPENING ──
async function fetchOpening() {
  try {
    const res = await fetch(`${BACKEND_URL}/api/session/start`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId, voice: selectedVoice })
    });

    const data = await res.json();
    addAIMsg(data.reply);
    speakText(data.reply);

  } catch {
    addAIMsg("Server not connected 😢");
  }
}

// ── SEND MESSAGE ──
async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  addUserMsg(text);
  stopSpeaking();

  try {
    const res = await fetch(`${BACKEND_URL}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        voice: selectedVoice,
        sessionId
      })
    });

    const data = await res.json();
    addAIMsg(data.reply);
    speakText(data.reply);

  } catch {
    addAIMsg("Connection error 😭");
  }
}

// ══════════════════════════════
// 🎤 FIXED VOICE INPUT
// ══════════════════════════════
function toggleVoice() {
  recognition = setupRecognition(); // ALWAYS new instance

  if (!recognition) {
    alert("Voice not supported");
    return;
  }

  stopSpeaking();
  recognition.start();
}

function setupRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;

  const rec = new SpeechRecognition();
  rec.lang = 'en-US';
  rec.interimResults = false;
  rec.continuous = false;

  rec.onstart = () => {
    isListening = true;
    document.getElementById('voice-status').textContent = `🎤 Listening (${selectedVoice})`;
  };

  rec.onresult = (e) => {
    const text = e.results[0][0].transcript;
    document.getElementById('user-input').value = text;
  };

  rec.onend = () => {
    isListening = false;
    document.getElementById('voice-status').textContent = '';

    const text = document.getElementById('user-input').value.trim();
    if (text) sendMessage();
  };

  rec.onerror = () => {
    isListening = false;
    document.getElementById('voice-status').textContent = '❌ Mic error';
  };

  return rec;
}

// ══════════════════════════════
// 🔊 TEXT TO SPEECH (IMPROVED)
// ══════════════════════════════
function speakText(text) {
  stopSpeaking();

  const clean = text.replace(/[^\w\s.,!?]/g, '');

  const utter = new SpeechSynthesisUtterance(clean);

  const settings = {
    Maya:  { pitch: 1.2, rate: 0.9 },
    Arjun: { pitch: 0.9, rate: 0.95 },
    Zara:  { pitch: 1.3, rate: 1.1 },
    Leo:   { pitch: 0.85, rate: 1.0 }
  };

  utter.pitch = settings[selectedVoice].pitch;
  utter.rate = settings[selectedVoice].rate;

  if (availableVoices.length === 0) {
    availableVoices = speechSynth.getVoices();
  }

  const voice = availableVoices.find(v => v.lang.includes("en"));
  if (voice) utter.voice = voice;

  speechSynth.speak(utter);
}

function stopSpeaking() {
  if (speechSynth.speaking) {
    speechSynth.cancel();
  }
}

// ── UI FUNCTIONS ──
function addAIMsg(text) {
  const box = document.getElementById('messages');
  box.innerHTML += `<div><b>${selectedVoice}:</b> ${text}</div>`;
}

function addUserMsg(text) {
  const box = document.getElementById('messages');
  box.innerHTML += `<div><b>You:</b> ${text}</div>`;
}
</script>
